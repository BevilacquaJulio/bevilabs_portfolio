services:
  api:
    image: bl_porfolio-api
    build:
      context: ./backend
    container_name: bl_portfolio-api
    restart: always
    env_file:
      - .env
    networks:
      - mysql_shared
      - traefik
      - bevilabs_app
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - "traefik.http.routers.bevilabs_api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - traefik.http.routers.bevilabs_api.priority=100
      - traefik.http.routers.bevilabs_api.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.bevilabs_api.tls=true
      - traefik.http.routers.bevilabs_api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.bevilabs_api.loadbalancer.server.port=3000

  web:
    image: bl_portfolio
    build:
      context: ./frontend
      args:
        # VITE_* precisa ser build arg: o valor e gravado no bundle.
        VITE_API_URL: https://${DOMAIN}/api
    container_name: bl_portfolio-app
    restart: always
    depends_on:
      - api
    networks:
      - traefik
      - bevilabs_app
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      # !PathPrefix evita que POST /api/* caia no nginx estatico (405 Not Allowed).
      - "traefik.http.routers.bevilabs_web.rule=Host(`${DOMAIN}`) && !PathPrefix(`/api`)"
      - traefik.http.routers.bevilabs_web.priority=1
      - traefik.http.routers.bevilabs_web.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.bevilabs_web.tls=true
      - traefik.http.routers.bevilabs_web.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.bevilabs_web.loadbalancer.server.port=80

networks:
  mysql_shared:
    external: true
  traefik:
    external: true
  bevilabs_app:
    driver: bridge
